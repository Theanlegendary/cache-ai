<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cache AI - One Click Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: white;
            border-radius: 10px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .card h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.5em;
            border-bottom: 3px solid #667eea;
            padding-bottom: 10px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 600;
        }

        input, textarea, select {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 1em;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 5px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            width: 100%;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        button:active {
            transform: translateY(0);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-box .number {
            font-size: 2em;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .stat-box .label {
            font-size: 0.9em;
            opacity: 0.9;
        }

        .rating-box {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 20px;
        }

        .rating-box .rating {
            font-size: 3em;
            font-weight: bold;
            margin: 10px 0;
        }

        .rating-box .label {
            font-size: 1.1em;
        }

        .sessions-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .session-item {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 10px;
            border-left: 4px solid #667eea;
        }

        .session-item .id {
            font-family: monospace;
            font-size: 0.85em;
            color: #666;
            word-break: break-all;
        }

        .session-item .user {
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }

        .session-item .interactions {
            font-size: 0.9em;
            color: #667eea;
        }

        .message {
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 15px;
            display: none;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .message.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
            display: block;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #e0e0e0;
        }

        .tab-button {
            background: none;
            color: #667eea;
            border: none;
            padding: 10px 20px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            width: auto;
        }

        .tab-button.active {
            border-bottom-color: #667eea;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        @media (max-width: 768px) {
            .main-grid {
                grid-template-columns: 1fr;
            }

            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            header h1 {
                font-size: 2em;
            }
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-right: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🚀 Cache AI Dashboard</h1>
            <p>AI Debugging & Caching Made Easy</p>
        </header>

        <!-- Statistics -->
        <div class="stats-grid">
            <div class="stat-box">
                <div class="number" id="sessionCount">0</div>
                <div class="label">Sessions</div>
            </div>
            <div class="stat-box">
                <div class="number" id="interactionCount">0</div>
                <div class="label">Interactions</div>
            </div>
            <div class="stat-box">
                <div class="number" id="tokenCount">0</div>
                <div class="label">Tokens Used</div>
            </div>
            <div class="stat-box">
                <div class="number" id="cacheHitRate">0%</div>
                <div class="label">Cache Hit Rate</div>
            </div>
        </div>

        <!-- Rating -->
        <div class="rating-box">
            <div class="label">Cache AI Rating</div>
            <div class="rating" id="rating">8.7</div>
            <div class="label">out of 10.0</div>
        </div>

        <!-- Main Content -->
        <div class="main-grid">
            <!-- Left Column -->
            <div>
                <!-- Create Session -->
                <div class="card">
                    <h2>➕ Create Session</h2>
                    <div id="createSessionMessage" class="message"></div>
                    <div class="input-group">
                        <label>Your Name</label>
                        <input type="text" id="userName" placeholder="e.g., DELL" required>
                    </div>
                    <div class="input-group">
                        <label>Repository (optional)</label>
                        <input type="text" id="repo" placeholder="e.g., my-project">
                    </div>
                    <div class="input-group">
                        <label>Branch (optional)</label>
                        <input type="text" id="branch" placeholder="e.g., main" value="main">
                    </div>
                    <button onclick="createSession()">✨ Create Session</button>
                </div>

                <!-- Log Interaction -->
                <div class="card" style="margin-top: 20px;">
                    <h2>💬 Log Interaction</h2>
                    <div id="logInteractionMessage" class="message"></div>
                    <div class="input-group">
                        <label>Session ID</label>
                        <input type="text" id="sessionId" placeholder="Paste session ID here">
                    </div>
                    <div class="input-group">
                        <label>Type</label>
                        <select id="interactionType">
                            <option value="debugging">🐛 Debugging</option>
                            <option value="code_generation">✍️ Code Generation</option>
                            <option value="optimization">⚡ Optimization</option>
                            <option value="documentation">📖 Documentation</option>
                            <option value="review">👀 Code Review</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Your Question/Issue</label>
                        <textarea id="userInput" placeholder="What's your question?"></textarea>
                    </div>
                    <div class="input-group">
                        <label>AI Response/Solution</label>
                        <textarea id="aiResponse" placeholder="What did the AI say?"></textarea>
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                        <div class="input-group" style="margin: 0;">
                            <label>Tokens Used</label>
                            <input type="number" id="tokens" placeholder="150" value="150">
                        </div>
                        <div class="input-group" style="margin: 0;">
                            <label>Response Time (ms)</label>
                            <input type="number" id="responseTime" placeholder="800" value="800">
                        </div>
                    </div>
                    <button onclick="logInteraction()" style="margin-top: 10px;">📝 Log Interaction</button>
                </div>
            </div>

            <!-- Right Column -->
            <div>
                <!-- Sessions List -->
                <div class="card">
                    <h2>📋 Your Sessions</h2>
                    <div id="sessionsList" class="sessions-list">
                        <p style="text-align: center; color: #999;">No sessions yet. Create one to get started!</p>
                    </div>
                    <button onclick="refreshSessions()" style="margin-top: 15px;">🔄 Refresh</button>
                </div>

                <!-- Rating & Compare -->
                <div class="card" style="margin-top: 20px;">
                    <h2>⭐ Compare</h2>
                    <div id="compareMessage" class="message"></div>
                    <div class="input-group">
                        <label>Compare Cache AI vs:</label>
                        <select id="compareProvider">
                            <option value="cursor">Cursor</option>
                            <option value="copilot">GitHub Copilot</option>
                            <option value="chatgpt">ChatGPT</option>
                            <option value="claude">Claude</option>
                            <option value="codex">Codex</option>
                        </select>
                    </div>
                    <button onclick="compareProvider()">⚔️ Compare</button>
                    <div id="comparisonResult" style="margin-top: 15px;"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:5000/api';

        // Load data on page load
        window.onload = function() {
            loadStats();
            refreshSessions();
            loadRating();
            setInterval(loadStats, 5000);
        };

        function showMessage(elementId, message, type = 'info') {
            const element = document.getElementById(elementId);
            element.textContent = message;
            element.className = `message ${type}`;
            setTimeout(() => {
                element.className = 'message';
            }, 5000);
        }

        async function createSession() {
            const userName = document.getElementById('userName').value;
            const repo = document.getElementById('repo').value;
            const branch = document.getElementById('branch').value;

            if (!userName) {
                showMessage('createSessionMessage', '❌ Please enter your name', 'error');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/sessions`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_id: userName,
                        repository: repo || null,
                        branch: branch || 'main'
                    })
                });

                const data = await response.json();
                if (data.status === 'success') {
                    document.getElementById('sessionId').value = data.session_id;
                    showMessage('createSessionMessage', `✅ Session created! ID: ${data.session_id.substring(0, 12)}...`, 'success');
                    refreshSessions();
                } else {
                    showMessage('createSessionMessage', `❌ ${data.message}`, 'error');
                }
            } catch (error) {
                showMessage('createSessionMessage', `❌ Error: ${error.message}`, 'error');
            }
        }

        async function logInteraction() {
            const sessionId = document.getElementById('sessionId').value;
            const type = document.getElementById('interactionType').value;
            const input = document.getElementById('userInput').value;
            const response = document.getElementById('aiResponse').value;
            const tokens = parseInt(document.getElementById('tokens').value) || 0;
            const time = parseInt(document.getElementById('responseTime').value) || 0;

            if (!sessionId || !input || !response) {
                showMessage('logInteractionMessage', '❌ Please fill all required fields', 'error');
                return;
            }

            try {
                const apiResponse = await fetch(`${API_URL}/interactions`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        session_id: sessionId,
                        type: type,
                        input: input,
                        response: response,
                        tokens: tokens,
                        time: time
                    })
                });

                const data = await apiResponse.json();
                if (data.status === 'success') {
                    showMessage('logInteractionMessage', '✅ Interaction logged successfully!', 'success');
                    document.getElementById('userInput').value = '';
                    document.getElementById('aiResponse').value = '';
                    loadStats();
                    refreshSessions();
                } else {
                    showMessage('logInteractionMessage', `❌ ${data.message}`, 'error');
                }
            } catch (error) {
                showMessage('logInteractionMessage', `❌ Error: ${error.message}`, 'error');
            }
        }

        async function loadStats() {
            try {
                const response = await fetch(`${API_URL}/stats`);
                const data = await response.json();
                if (data.status === 'success') {
                    const stats = data.statistics;
                    document.getElementById('sessionCount').textContent = stats.total_sessions;
                    document.getElementById('interactionCount').textContent = stats.total_interactions;
                    document.getElementById('tokenCount').textContent = stats.total_tokens || 0;
                    document.getElementById('cacheHitRate').textContent = stats.cache_hit_rate;
                }
            } catch (error) {
                console.error('Error loading stats:', error);
            }
        }

        async function refreshSessions() {
            try {
                const response = await fetch(`${API_URL}/sessions?limit=10`);
                const data = await response.json();
                if (data.status === 'success' && data.sessions.length > 0) {
                    const html = data.sessions.map(session => `
                        <div class="session-item">
                            <div class="user">👤 ${session.user_id}</div>
                            <div class="id">ID: ${session.session_id}</div>
                            <div class="interactions">📝 ${session.total_interactions} interactions | 🎯 ${session.total_tokens} tokens</div>
                        </div>
                    `).join('');
                    document.getElementById('sessionsList').innerHTML = html;
                }
            } catch (error) {
                console.error('Error loading sessions:', error);
            }
        }

        async function loadRating() {
            try {
                const response = await fetch(`${API_URL}/rate`);
                const data = await response.json();
                if (data.status === 'success') {
                    document.getElementById('rating').textContent = data.rating.toFixed(1);
                }
            } catch (error) {
                console.error('Error loading rating:', error);
            }
        }

        async function compareProvider() {
            const provider = document.getElementById('compareProvider').value;
            try {
                const response = await fetch(`${API_URL}/compare/${provider}`);
                const data = await response.json();
                if (data.status === 'success') {
                    const comp = data.comparison;
                    const html = `
                        <div style="background: #f5f5f5; padding: 15px; border-radius: 5px;">
                            <strong>Cache AI: ${comp.overall.cache_ai}/10</strong><br>
                            <strong>${provider.toUpperCase()}: ${comp.overall.opponent}/10</strong><br>
                            <div style="margin-top: 10px; padding-top: 10px; border-top: 1px solid #ddd;">
                                <strong>Winner: ${comp.overall.winner.toUpperCase()}</strong>
                            </div>
                        </div>
                    `;
                    document.getElementById('comparisonResult').innerHTML = html;
                    showMessage('compareMessage', '✅ Comparison loaded', 'success');
                } else {
                    showMessage('compareMessage', `❌ ${data.message}`, 'error');
                }
            } catch (error) {
                showMessage('compareMessage', `❌ Error: ${error.message}`, 'error');
            }
        }
    </script>
</body>
</html>
